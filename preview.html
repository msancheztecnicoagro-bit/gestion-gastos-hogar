<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor Financiero Personal</title>

<link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:20px}
.dark{background:#121212;color:#fff}
.container{max-width:1400px;margin:auto}
h1{text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin:20px 0}
.card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.dark .card{background:#1e1e1e}
.value{font-size:1.6rem;font-weight:bold}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
#table{background:#fff}
.dark #table{background:#1e1e1e}
canvas{background:#fff;padding:10px;border-radius:10px}
.dark canvas{background:#1e1e1e}
</style>
</head>
<body>
<div class="container">
<h1>💰 Gestor Financiero Personal</h1>

<div class="cards">
<div class="card"><div>Balance</div><div class="value" id="balance">$0</div></div>
<div class="card"><div>Ingresos</div><div class="value" id="ingresos">$0</div></div>
<div class="card"><div>Gastos</div><div class="value" id="gastos">$0</div></div>
</div>

<div class="actions">
<button onclick="agregarFila()">➕ Agregar fila</button>
<button onclick="exportarExcel()">📊 Excel</button>
<button onclick="exportarCSV()">📄 CSV</button>
<button onclick="toggleDark()">🌙 Modo oscuro</button>
</div>

<div id="table"></div>

<h2>Resumen</h2>
<canvas id="grafico"></canvas>
</div>

<script>
let datos = JSON.parse(localStorage.getItem("gastosExcel")) || [
{fecha:new Date().toISOString().split('T')[0],categoria:"Sueldo",descripcion:"Ingreso inicial",cuenta:"Banco",ingreso:1000000,gasto:0}
];

const table = new Tabulator("#table",{
height:"500px",
layout:"fitColumns",
data:datos,
reactiveData:true,
columns:[
{title:"Fecha",field:"fecha",editor:"input"},
{title:"Categoría",field:"categoria",editor:"input"},
{title:"Descripción",field:"descripcion",editor:"input"},
{title:"Cuenta",field:"cuenta",editor:"input"},
{title:"Ingreso",field:"ingreso",editor:"number"},
{title:"Gasto",field:"gasto",editor:"number"},
{title:"Saldo",field:"saldo",mutator:function(v,d){
return (Number(d.ingreso)||0)-(Number(d.gasto)||0);
}},
{title:"Eliminar",formatter:function(){return "🗑️";},cellClick:function(e,cell){
cell.getRow().delete();
guardar();
}}
],
cellEdited:function(){guardar();}
});

function guardar(){
localStorage.setItem("gastosExcel",JSON.stringify(table.getData()));
actualizar();
}

function agregarFila(){
table.addRow({fecha:new Date().toISOString().split('T')[0],categoria:"",descripcion:"",cuenta:"",ingreso:0,gasto:0});
guardar();
}

function actualizar(){
const data = table.getData();
let ingresos=0,gastos=0;

data.forEach(r=>{
ingresos += Number(r.ingreso)||0;
gastos += Number(r.gasto)||0;
});

document.getElementById("ingresos").innerText="$"+ingresos.toLocaleString('es-CL');
document.getElementById("gastos").innerText="$"+gastos.toLocaleString('es-CL');
document.getElementById("balance").innerText="$"+(ingresos-gastos).toLocaleString('es-CL');

actualizarGrafico(ingresos,gastos);
}

function exportarCSV(){
table.download("csv","gastos.csv");
}

function exportarExcel(){
table.download("xlsx","gastos.xlsx",{sheetName:"Movimientos"});
}

function toggleDark(){
document.body.classList.toggle("dark");
}

let chart;
function actualizarGrafico(i,g){
const ctx=document.getElementById("grafico");
if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Ingresos","Gastos"],
datasets:[{data:[i,g]}]
}
});
}

actualizar();
</script>
</body>
</html>
